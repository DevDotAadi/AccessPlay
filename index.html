<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AccessPlay | Minimal Puzzle</title>
    <meta name="description" content="A clean, accessible color sort puzzle for motor-impaired users.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header role="banner" class="glass-panel">
            <div class="brand">
                <h1>AccessPlay</h1>
                <p class="subtitle">An inclusive, minimal color-sort puzzle designed for every type of play.</p>
            </div>
            
            <div class="header-controls">
                <div class="controls" role="group" aria-label="Game controls">
                    <button id="toggle-hc" title="Toggle High Contrast Mode [H]" aria-pressed="false">
                        High Contrast
                    </button>
                    <button id="toggle-scan" title="Toggle Scan Mode [S]" aria-pressed="false">
                        Scan Mode
                    </button>
                    <button id="restart-btn" title="Restart Game [R]">
                        Restart
                    </button>
                </div>
                
                <div class="difficulty-select" role="radiogroup" aria-label="Difficulty level">
                    <button role="radio" aria-checked="false" data-level="easy">Easy</button>
                    <button role="radio" aria-checked="true" data-level="medium">Medium</button>
                    <button role="radio" aria-checked="false" data-level="hard">Hard</button>
                </div>

                <div class="settings-bar" role="group" aria-label="Game settings">
                    <label for="scan-speed">Scan Interval: <span id="speed-val">1.5</span>s</label>
                    <input type="range" id="scan-speed" min="0.5" max="4.0" step="0.5" value="1.5">
                </div>
            </div>
        </header>

        <main>
            <section id="goal-section" aria-labelledby="goal-heading" class="glass-panel">
                <h2 id="goal-heading">Goal Pattern</h2>
                <div id="goal-pattern" class="pattern-display" aria-hidden="true">
                    <!-- Goal preview generated by JS -->
                </div>
                <p class="sr-only" id="goal-description">Loading goal pattern...</p>
            </section>

            <section id="game-section" class="glass-panel">
                <div id="game-grid" 
                     role="grid" 
                     aria-label="Puzzle Grid" 
                     tabindex="0">
                    <!-- Grid cells generated by JS -->
                </div>
            </section>
        </main>

        <footer role="contentinfo">
            <div class="status-bar glass-panel" role="status" aria-live="polite">
                <div class="status-item">Moves: <span id="move-count">0</span></div>
                <div class="status-item" id="selection-status">Selected: None</div>
            </div>
            <div class="instructions">
                <p>Use <strong>Arrow Keys</strong> to move, <strong>Space/Enter</strong> to select/swap, <strong>Esc</strong> to deselect.</p>
            </div>
        </footer>
    </div>

    <!-- Hidden ARIA Live Region for important announcements -->
    <div id="announcer" class="sr-only" aria-live="assertive"></div>

    <script src="game.js"></script>
</body>
</html>
